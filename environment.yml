name: 575-project
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11
  
  # Data processing
  - pandas>=2.0.0
  - numpy>=1.24.0
  - scipy>=1.10.0
  - matplotlib>=3.7.0
  
  # Text processing
  - nltk>=3.8.0
  
  # System utilities
  - requests>=2.31.0
  
  # Package manager
  - pip
  
  # Python packages via pip
  - pip:
    # Information Retrieval
    - rank-bm25>=0.2.1
    - sentence-transformers>=2.2.0
    - faiss-cpu>=1.8.0
    
    # Utilities
    - python-dotenv>=1.0.0
    - scikit-learn>=1.3.0
    - tqdm>=4.66.0
    
    # Optional: Framework support
    - langchain>=0.1.0
    - langchain-community>=0.0.1
    
    # Web Application
    - streamlit>=1.28.0
    
    # Jupyter & Notebooks
    - jupyter>=1.0.0
    - notebook>=7.0.0
    - ipykernel>=6.25.0
