name: 575-project
channels:
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.11

  # Data processing
  - pandas>=2.0.0
  - numpy>=1.24.0
  - matplotlib>=3.7.0

  # System utilities
  - requests>=2.31.0

  # Package manager
  - pip

  # Python packages via pip
  - pip:
      # Deep Learning (only torch — torchvision/audio not used)
      - torch>=2.0.0

      # Transformers pinned <5.0 to avoid noisy __path__ deprecation warnings
      - transformers>=4.30.0,<5.0
      - sentence-transformers>=2.2.0

      # Data processing
      - duckdb>=0.9.0

      # Information Retrieval
      - bm25s>=0.2.0
      - faiss-cpu>=1.8.0

      # Utilities
      - python-dotenv>=1.0.0
      - tqdm>=4.66.0

      # Web Application
      - streamlit>=1.28.0

      # LLM Integration
      - groq>=0.4.0

      # Jupyter & Notebooks
      - jupyter>=1.0.0
      - notebook>=7.0.0
      - ipykernel>=6.25.0
